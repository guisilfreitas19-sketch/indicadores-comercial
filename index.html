<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
  import { getFirestore, doc, setDoc, getDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: 'AIzaSyCRxs7TRimJWJIQTK2YfyC8vlea8zN7aQ4',
    authDomain: 'indicadores---comercial.firebaseapp.com',
    projectId: 'indicadores---comercial',
    storageBucket: 'indicadores---comercial.firebasestorage.app',
    messagingSenderId: '466070366982',
    appId: '1:466070366982:web:fb544884025f1723fe8c87'
  };

  const meses = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  let marcaAtual = 'MED';

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  function moeda(valor) {
    return Number(valor || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
  }

  function numero(id) {
    const campo = document.getElementById(id);
    if (!campo) return 0;
    const valor = String(campo.value || '').replace(/\./g, '').replace(',', '.').replace(/[^0-9.-]/g, '');
    return parseFloat(valor) || 0;
  }

  function percentual(base, atual) {
    if (base === 0 && atual === 0) return '0,00%';
    if (base === 0) return '100,00%';
    return (((atual - base) / base) * 100).toFixed(2).replace('.', ',') + '%';
  }

  function percentualNumero(base, atual) {
    if (base === 0 && atual === 0) return 0;
    if (base === 0) return 100;
    return ((atual - base) / base) * 100;
  }

  function taxa(cancel, vendas) {
    if (vendas === 0) return '0,00%';
    return ((cancel / vendas) * 100).toFixed(2).replace('.', ',') + '%';
  }

  function classeVariacao(valor, inverso = false) {
    if (valor === 0) return 'neutro';
    if (!inverso) return valor > 0 ? 'positivo' : 'negativo';
    return valor < 0 ? 'positivo' : 'negativo';
  }

  function formatarCampoMoeda(input) {
    let valor = (input.value || '').replace(/\D/g, '');
    if (!valor) {
      input.value = '';
      return;
    }
    input.value = (parseInt(valor, 10) / 100).toLocaleString('pt-BR', {
      minimumFractionDigits: 2,
      maximumFractionDigits: 2
    });
  }

  function setStatus(msg) {
    document.getElementById('statusSalvamento').textContent = msg;
  }

  function setSecaoAberta(id, headerId, aberta) {
    const el = document.getElementById(id);
    const header = document.getElementById(headerId);
    el.classList.toggle('open', aberta);
    header.classList.toggle('open', aberta);
  }

  function toggleSecao(id, headerId) {
    const el = document.getElementById(id);
    const header = document.getElementById(headerId);
    const aberta = !el.classList.contains('open');
    el.classList.toggle('open', aberta);
    header.classList.toggle('open', aberta);
  }
  window.toggleSecao = toggleSecao;

  function criarTabela(idTabela, prefixo) {
    const tbody = document.getElementById(idTabela);
    tbody.innerHTML = '';
    meses.forEach((mes, i) => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${mes}</td>
        <td><input class="valor" type="text" inputmode="numeric" id="${prefixo}_v25_${i}" placeholder="0,00"></td>
        <td><input class="valor" type="text" inputmode="numeric" id="${prefixo}_v26_${i}" placeholder="0,00"></td>
        <td><input class="valor" type="text" inputmode="numeric" id="${prefixo}_c25_${i}" placeholder="0,00"></td>
        <td><input class="valor" type="text" inputmode="numeric" id="${prefixo}_c26_${i}" placeholder="0,00"></td>
        <td id="${prefixo}_pv_${i}">0,00%</td>
        <td id="${prefixo}_pc_${i}">0,00%</td>
        <td id="${prefixo}_t25_${i}">0,00%</td>
        <td id="${prefixo}_t26_${i}">0,00%</td>
      `;
      tbody.appendChild(tr);
    });
  }

  function atualizarLinhasDaTabela(prefixo) {
    for (let i = 0; i < 12; i++) {
      const v25 = numero(`${prefixo}_v25_${i}`);
      const v26 = numero(`${prefixo}_v26_${i}`);
      const c25 = numero(`${prefixo}_c25_${i}`);
      const c26 = numero(`${prefixo}_c26_${i}`);
      const pv = percentualNumero(v25, v26);
      const pc = percentualNumero(c25, c26);
      const elPV = document.getElementById(`${prefixo}_pv_${i}`);
      const elPC = document.getElementById(`${prefixo}_pc_${i}`);
      elPV.textContent = percentual(v25, v26);
      elPV.className = classeVariacao(pv, false);
      elPC.textContent = percentual(c25, c26);
      elPC.className = classeVariacao(pc, true);
      document.getElementById(`${prefixo}_t25_${i}`).textContent = taxa(c25, v25);
      document.getElementById(`${prefixo}_t26_${i}`).textContent = taxa(c26, v26);
    }
  }

  function coletarDadosFormulario() {
    const inputs = document.querySelectorAll('input.valor, select#mesSelecionado');
    const formData = {};
    inputs.forEach(input => {
      formData[input.id] = input.value;
    });
    return {
      formData,
      marcaAtual,
      secoes: {
        med: document.getElementById('secaoMED').classList.contains('open'),
        ecos: document.getElementById('secaoECOS').classList.contains('open')
      }
    };
  }

  function aplicarDadosFormulario(payload) {
    if (!payload) return;
    const { formData = {}, marcaAtual: marcaSalva = 'MED', secoes = {} } = payload;
    Object.entries(formData).forEach(([id, value]) => {
      const el = document.getElementById(id);
      if (el) el.value = value;
    });
    marcaAtual = marcaSalva;
    document.querySelectorAll('.brand-tab').forEach(btn => btn.classList.remove('active'));
    const alvo = Array.from(document.querySelectorAll('.brand-tab')).find(btn => btn.textContent.trim() === marcaAtual);
    if (alvo) alvo.classList.add('active');
    setSecaoAberta('secaoMED', 'headerSecaoMED', !!secoes.med);
    setSecaoAberta('secaoECOS', 'headerSecaoECOS', !!secoes.ecos);
    calcularDashboard();
  }

  function selecionarMarca(marca, botao) {
    marcaAtual = marca;
    document.querySelectorAll('.brand-tab').forEach(btn => btn.classList.remove('active'));
    botao.classList.add('active');
    if (marca === 'MED') {
      setSecaoAberta('secaoMED', 'headerSecaoMED', true);
      setSecaoAberta('secaoECOS', 'headerSecaoECOS', false);
    } else {
      setSecaoAberta('secaoECOS', 'headerSecaoECOS', true);
      setSecaoAberta('secaoMED', 'headerSecaoMED', false);
    }
    calcularDashboard();
  }
  window.selecionarMarca = selecionarMarca;

  function calcularDashboard() {
    atualizarLinhasDaTabela('med');
    atualizarLinhasDaTabela('ecos');

    const mes = parseInt(document.getElementById('mesSelecionado').value || '0', 10);
    const prefixo = marcaAtual === 'MED' ? 'med' : 'ecos';

    let av25 = 0, av26 = 0, ac25 = 0, ac26 = 0;
    for (let i = 0; i <= mes; i++) {
      av25 += numero(`${prefixo}_v25_${i}`);
      av26 += numero(`${prefixo}_v26_${i}`);
      ac25 += numero(`${prefixo}_c25_${i}`);
      ac26 += numero(`${prefixo}_c26_${i}`);
    }

    const v25 = numero(`${prefixo}_v25_${mes}`);
    const v26 = numero(`${prefixo}_v26_${mes}`);
    const c25 = numero(`${prefixo}_c25_${mes}`);
    const c26 = numero(`${prefixo}_c26_${mes}`);

    const varV = percentualNumero(v25, v26);
    const varC = percentualNumero(c25, c26);

    document.getElementById('mesSelecionadoLabel').textContent = meses[mes];
    document.getElementById('marcaSelecionadaLabel').textContent = marcaAtual;
    document.getElementById('cardVendas2025').textContent = moeda(v25);
    document.getElementById('cardVendas2026').textContent = moeda(v26);
    document.getElementById('cardCancel2025').textContent = moeda(c25);
    document.getElementById('cardCancel2026').textContent = moeda(c26);
    document.getElementById('cardAcumVendas2025').textContent = moeda(av25);
    document.getElementById('cardAcumVendas2026').textContent = moeda(av26);
    document.getElementById('cardAcumCancel2025').textContent = moeda(ac25);
    document.getElementById('cardAcumCancel2026').textContent = moeda(ac26);

    const elVarV = document.getElementById('cardVarVendas');
    elVarV.textContent = `Variação: ${percentual(v25, v26)}`;
    elVarV.className = classeVariacao(varV, false);

    const elVarC = document.getElementById('cardVarCancel');
    elVarC.textContent = `Variação: ${percentual(c25, c26)}`;
    elVarC.className = classeVariacao(varC, true);
  }
  window.calcularDashboard = calcularDashboard;

  async function salvarFirebase() {
    try {
      const dados = coletarDadosFormulario();
      await setDoc(doc(db, 'dashboard', 'med-ecos'), dados);
      setStatus('Salvo no Firebase');
    } catch (error) {
      console.error(error);
      setStatus('Erro ao salvar');
    }
  }
  window.salvarFirebase = salvarFirebase;

  async function carregarFirebase() {
    try {
      const snap = await getDoc(doc(db, 'dashboard', 'med-ecos'));
      if (snap.exists()) {
        aplicarDadosFormulario(snap.data());
        setStatus('Dados carregados do Firebase');
      } else {
        setStatus('Nenhum dado salvo no Firebase');
      }
    } catch (error) {
      console.error(error);
      setStatus('Erro ao carregar');
    }
  }
  window.carregarFirebase = carregarFirebase;

  function ativarEventosCampos() {
    document.querySelectorAll('input.valor').forEach(input => {
      input.addEventListener('input', (e) => {
        formatarCampoMoeda(e.target);
        calcularDashboard();
      });
      input.addEventListener('blur', (e) => formatarCampoMoeda(e.target));
    });
    document.getElementById('mesSelecionado').addEventListener('change', calcularDashboard);
  }

  criarTabela('tabelaMED', 'med');
  criarTabela('tabelaECOS', 'ecos');
  setSecaoAberta('secaoMED', 'headerSecaoMED', false);
  setSecaoAberta('secaoECOS', 'headerSecaoECOS', false);
  ativarEventosCampos();
  calcularDashboard();
  carregarFirebase();
</script>
