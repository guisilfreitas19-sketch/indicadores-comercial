<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PACS v3.2 | BI Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #f4f7fe; --card: #ffffff; --primary: #1e40af; --text: #1b2559;
      --muted: #a3aed0; --border: #e9edf7; --good: #05cd99; --bad: #ee5d50;
    }
    * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
    body { margin: 0; padding: 20px; background-color: var(--bg); color: var(--text); }
    .container { max-width: 1600px; margin: 0 auto; }
    
    /* Header */
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
    .header-info h1 { margin: 0; font-size: 28px; font-weight: 800; }
    #statusBadge { padding: 4px 12px; border-radius: 20px; font-size: 12px; margin-left: 10px; text-transform: uppercase; color: white; font-weight: 800; transition: 0.3s; }
    
    .brand-selector { background: #e9edf7; padding: 5px; border-radius: 12px; display: flex; gap: 5px; }
    .brand-btn { padding: 8px 20px; border: none; border-radius: 10px; cursor: pointer; font-weight: 700; color: var(--primary); background: transparent; transition: 0.3s; }
    .brand-btn.active { background: #fff; box-shadow: 0px 4px 14px rgba(0,0,0,0.05); }
    select { padding: 10px; border-radius: 12px; border: 1px solid var(--border); font-weight: 700; cursor: pointer; }

    /* Cards */
    .grid-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 25px; }
    .card-stat { background: var(--card); padding: 20px; border-radius: 20px; box-shadow: 0px 18px 40px rgba(112, 144, 176, 0.12); border: 2px solid transparent; }
    .card-stat .value { font-size: 26px; font-weight: 800; margin: 5px 0; }
    .variation { font-size: 13px; font-weight: 800; }
    
    /* Gráficos */
    .charts-container { display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px; margin-bottom: 25px; }
    .chart-card { background: var(--card); padding: 20px; border-radius: 20px; box-shadow: 0px 18px 40px rgba(112, 144, 176, 0.08); height: 350px; }
    .chart-card h3 { margin: 0 0 15px 0; font-size: 14px; color: var(--muted); text-transform: uppercase; }

    /* Tabela */
    .collapsible-section { background: var(--card); border-radius: 20px; box-shadow: 0px 18px 40px rgba(112, 144, 176, 0.08); overflow: hidden; }
    .trigger { padding: 20px; display: flex; justify-content: space-between; cursor: pointer; align-items: center; border-bottom: 1px solid var(--border); }
    .content { padding: 20px; overflow-x: auto; }
    
    table { width: 100%; border-collapse: collapse; min-width: 800px; }
    th { padding: 12px; color: var(--muted); font-size: 11px; text-transform: uppercase; border-bottom: 1px solid var(--border); }
    td { padding: 10px; border-bottom: 1px solid var(--border); text-align: center; font-weight: 600; font-size: 14px; }
    
    input.valor { width: 125px; padding: 8px; border: 1px solid var(--border); border-radius: 8px; text-align: right; font-weight: 700; color: var(--text); background: #fff; }
    .positivo { color: var(--good); } .negativo { color: var(--bad); }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="header-info">
      <h1>PACS v3.2 <span id="statusBadge" style="background: var(--primary);">CONECTADO</span></h1>
      <p>Performance: <span id="labelFoco">MED</span> | <span id="labelMes">...</span></p>
    </div>
    <div style="display: flex; gap: 15px;">
      <div class="brand-selector">
        <button class="brand-btn active" id="btnMED" onclick="toggleMarca('MED')">MED</button>
        <button class="brand-btn" id="btnECOS" onclick="toggleMarca('ECOS')">ECOS</button>
      </div>
      <select id="mesSelecionado" onchange="atualizarTudo()"></select>
    </div>
  </div>

  <div class="grid-stats">
    <div class="card-stat">
      <span style="font-size:12px; color:var(--muted); font-weight:700">VENDA NO MÊS</span>
      <div class="value" id="valVenda26">R$ 0,00</div>
      <div class="variation" id="varVendaMes">0%</div>
    </div>
    <div class="card-stat">
      <span style="font-size:12px; color:var(--muted); font-weight:700">CANCELAMENTOS</span>
      <div class="value" id="valCancel26">R$ 0,00</div>
      <div class="variation" id="varCancelMes">0%</div>
    </div>
    <div class="card-stat">
      <span style="font-size:12px; color:var(--muted); font-weight:700">FATURAMENTO ACUMULADO</span>
      <div class="value" id="valVendaAcum26" style="color:var(--primary)">R$ 0,00</div>
    </div>
    <div class="card-stat">
      <span style="font-size:12px; color:var(--muted); font-weight:700">CHURN MÉDIO (ANO)</span>
      <div class="value" id="valChurnMedio">0%</div>
    </div>
  </div>

  <div class="charts-container">
    <div class="chart-card">
      <h3>Comparativo de Vendas (2025 vs 2026)</h3>
      <canvas id="chartVendas"></canvas>
    </div>
    <div class="chart-card">
      <h3>Taxa de Churn % Mensal</h3>
      <canvas id="chartChurn"></canvas>
    </div>
  </div>

  <div class="collapsible-section">
    <div class="trigger" onclick="toggleTabela()">
      <h2 style="margin:0; font-size:18px;">📊 Base de Dados</h2>
      <span id="setaIcon" style="font-size: 18px; transition: 0.3s;">▼</span>
    </div>
    <div class="content" id="tabelaConteudo">
      <table>
        <thead><tr><th>Mês</th><th>Venda 25</th><th>Venda 26</th><th>Canc. 25</th><th>Canc. 26</th><th>Crescimento</th><th>Churn %</th></tr></thead>
        <tbody id="tabelaCorpo"></tbody>
      </table>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
  import { getFirestore, doc, setDoc, getDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: 'AIzaSyCRxs7TRimJWJIQTK2YfyC8vlea8zN7aQ4',
    authDomain: 'indicadores---comercial.firebaseapp.com',
    projectId: 'indicadores---comercial',
    storageBucket: 'indicadores---comercial.firebasestorage.app',
    messagingSenderId: '466070366982',
    appId: '1:466070366982:web:fb544884025f1723fe8c87'
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const meses = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const dados25 = {
    MED: { v: [7698.73, 7384.1, 7319.21, 6889.7, 6787.88, 6555.33, 6120.57, 7382.24, 7722.42, 9290, 7539.89, 1630], c: [8388.78, 14521.65, 5923.47, 6952.96, 11365.47, 6861.42, 12172.26, 9403.44, 8302.92, 11795.2, 12577.45, 9324.45] },
    ECOS: { v: [10887.5, 430, 7425, 9750, 7285, 2920, 10380, 9300, 7080, 5716.86, 3400, 1500], c: [1800, 4352.68, 4415.34, 2095.42, 3774.83, 4452.77, 8607.01, 8326.79, 6160.05, 4789.13, 10800, 4707.5] }
  };

  let marca = 'MED';
  let dados26 = { MED: {}, ECOS: {} };
  let vChart, cChart;

  const sel = document.getElementById('mesSelecionado');
  meses.forEach((m, i) => sel.add(new Option(m, i)));
  sel.value = 3;

  function initCharts() {
    const commonOpts = { responsive: true, maintainAspectRatio: false, animation: false, plugins: { legend: { position: 'bottom' } } };
    vChart = new Chart(document.getElementById('chartVendas'), {
      type: 'bar',
      data: { labels: meses.map(m => m.substring(0,3)), datasets: [
        { label: '2025', data: [], backgroundColor: '#e9edf7', borderRadius: 4 },
        { label: '2026', data: [], backgroundColor: '#1e40af', borderRadius: 4 }
      ]},
      options: commonOpts
    });
    cChart = new Chart(document.getElementById('chartChurn'), {
      type: 'line',
      data: { labels: meses.map(m => m.substring(0,3)), datasets: [{ label: 'Churn %', data: [], borderColor: '#ee5d50', tension: 0.4, pointRadius: 4 }]},
      options: commonOpts
    });
  }

  window.toggleTabela = () => {
    const conteudo = document.getElementById('tabelaConteudo');
    const seta = document.getElementById('setaIcon');
    const isHidden = conteudo.style.display === 'none';
    conteudo.style.display = isHidden ? 'block' : 'none';
    seta.style.transform = isHidden ? 'rotate(0deg)' : 'rotate(-90deg)';
  };

  window.toggleMarca = (m) => {
    salvarMemoriaLocal();
    marca = m;
    document.getElementById('btnMED').classList.toggle('active', m === 'MED');
    document.getElementById('btnECOS').classList.toggle('active', m === 'ECOS');
    document.getElementById('labelFoco').textContent = m;
    renderTabela();
    atualizarTudo();
  };

  function salvarMemoriaLocal() {
    meses.forEach((_, i) => {
      dados26[marca][`v_${i}`] = document.getElementById(`v26_${i}`)?.value || '';
      dados26[marca][`c_${i}`] = document.getElementById(`c26_${i}`)?.value || '';
    });
  }

  window.maskMoney = (i) => {
    let v = i.value.replace(/\D/g, '');
    v = (v / 100).toFixed(2).replace(".", ",").replace(/(\d)(?=(\d{3})+(?!\d))/g, "$1.");
    i.value = v; 
    atualizarTudo();
  };

  function renderTabela() {
    const corpo = document.getElementById('tabelaCorpo');
    corpo.innerHTML = '';
    meses.forEach((m, i) => {
      const v25 = dados25[marca].v[i];
      const c25 = dados25[marca].c[i];
      corpo.innerHTML += `<tr>
        <td><b>${m.substring(0,3)}</b></td>
        <td>R$ ${v25.toLocaleString('pt-BR', {minimumFractionDigits:2})}</td>
        <td><input class="valor" id="v26_${i}" oninput="maskMoney(this)" value="${dados26[marca][`v_${i}`] || ''}"></td>
        <td>R$ ${c25.toLocaleString('pt-BR', {minimumFractionDigits:2})}</td>
        <td><input class="valor" id="c26_${i}" oninput="maskMoney(this)" value="${dados26[marca][`c_${i}`] || ''}"></td>
        <td id="rowVar_${i}">0%</td><td id="rowCh_${i}">0%</td>
      </tr>`;
    });
  }

  window.atualizarTudo = () => {
    salvarMemoriaLocal();
    const midx = parseInt(sel.value);
    document.getElementById('labelMes').textContent = meses[midx];
    let acV26 = 0, chSum = 0, chCount = 0;
    let chartV25 = [], chartV26 = [], chartChurn = [];

    meses.forEach((_, i) => {
      const v25 = dados25[marca].v[i];
      const c25 = dados25[marca].c[i];
      const v26 = parseFloat((dados26[marca][`v_${i}`] || '0').replace(/\./g, '').replace(',', '.')) || 0;
      const c26 = parseFloat((dados26[marca][`c_${i}`] || '0').replace(/\./g, '').replace(',', '.')) || 0;
      
      const varPct = v25 > 0 ? ((v26-v25)/v25*100).toFixed(1) : 0;
      const churn = v26 > 0 ? (c26/v26*100).toFixed(1) : 0;

      document.getElementById(`rowVar_${i}`).textContent = varPct + '%';
      document.getElementById(`rowVar_${i}`).className = varPct >= 0 ? 'positivo' : 'negativo';
      document.getElementById(`rowCh_${i}`).textContent = churn + '%';
      document.getElementById(`rowCh_${i}`).className = churn > 15 ? 'negativo' : 'positivo';

      chartV25.push(v25); chartV26.push(v26); chartChurn.push(churn);
      if(i <= midx) { acV26 += v26; if(v26>0) { chSum += parseFloat(churn); chCount++; } }

      if(i === midx) {
        document.getElementById('valVenda26').textContent = 'R$ ' + v26.toLocaleString('pt-BR', {minimumFractionDigits:2});
        document.getElementById('varVendaMes').textContent = (varPct >= 0 ? '+':'') + varPct + '% vs 2025';
        document.getElementById('valCancel26').textContent = 'R$ ' + c26.toLocaleString('pt-BR', {minimumFractionDigits:2});
        const cVar = c25 > 0 ? ((c26-c25)/c25*100).toFixed(1) : 0;
        document.getElementById('varCancelMes').textContent = (cVar >= 0 ? '+':'') + cVar + '% vs 2025';
        
        const badge = document.getElementById('statusBadge');
        if (churn > 15) { badge.textContent = 'ATENÇÃO CHURN'; badge.style.background = 'var(--bad)'; } 
        else { badge.textContent = 'SAUDÁVEL'; badge.style.background = 'var(--good)'; }
      }
    });

    document.getElementById('valVendaAcum26').textContent = 'R$ ' + acV26.toLocaleString('pt-BR', {minimumFractionDigits:2});
    document.getElementById('valChurnMedio').textContent = (chCount > 0 ? (chSum/chCount).toFixed(1) : 0) + '%';
    
    if(vChart) { vChart.data.datasets[0].data = chartV25; vChart.data.datasets[1].data = chartV26; vChart.update(); }
    if(cChart) { cChart.data.datasets[0].data = chartChurn; cChart.update(); }
    
    agendarSalvamento();
  }

  let saveTimer;
  function agendarSalvamento() {
    clearTimeout(saveTimer);
    const badge = document.getElementById('statusBadge');
    badge.textContent = 'SINCRONIZANDO...';
    badge.style.background = '#f6ad55';
    saveTimer = setTimeout(async () => {
      try {
        await setDoc(doc(db, 'dashboard', 'pacs_v2'), { ...dados26, config: { marca, mes: sel.value } });
        badge.textContent = 'SALVO';
        badge.style.background = 'var(--good)';
      } catch (e) { console.error("Erro ao salvar:", e); }
    }, 1500);
  }

  async function load() {
    initCharts();
    try {
      const snap = await getDoc(doc(db, 'dashboard', 'pacs_v2'));
      if(snap.exists()) {
        const d = snap.data();
        if(d.MED) dados26.MED = d.MED;
        if(d.ECOS) dados26.ECOS = d.ECOS;
        if(d.config) { marca = d.config.marca || 'MED'; sel.value = d.config.mes || 3; }
      }
      renderTabela();
      atualizarTudo();
    } catch(e) { console.error("Erro Firebase:", e); }
  }
  load();
</script>
</body>
</html>
