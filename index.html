<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PACS v2.7 | Business Intelligence</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4f7fe;
      --card: #ffffff;
      --primary: #1e40af;
      --text: #1b2559;
      --muted: #a3aed0;
      --border: #e9edf7;
      --good: #05cd99;
      --bad: #ee5d50;
    }

    * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
    body { margin: 0; padding: 20px; background-color: var(--bg); color: var(--text); }
    .container { max-width: 1600px; margin: 0 auto; }

    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
    .header-info h1 { margin: 0; font-size: 28px; font-weight: 800; }
    .header-info p { margin: 5px 0 0; font-size: 14px; color: var(--muted); font-weight: 600; }
    #statusBadge { padding: 4px 12px; border-radius: 20px; font-size: 12px; margin-left: 10px; text-transform: uppercase; color: white; font-weight: 800; }

    .top-controls { display: flex; gap: 15px; align-items: center; }
    .brand-selector { background: #e9edf7; padding: 5px; border-radius: 12px; display: flex; gap: 5px; }
    .brand-btn { padding: 8px 20px; border: none; border-radius: 10px; cursor: pointer; font-weight: 700; color: var(--primary); background: transparent; transition: 0.3s; }
    .brand-btn.active { background: #fff; box-shadow: 0px 4px 14px rgba(0,0,0,0.05); }

    select { padding: 10px; border-radius: 12px; border: 1px solid var(--border); background: #fff; font-weight: 700; cursor: pointer; }

    .grid-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
    .card-stat { background: var(--card); padding: 22px; border-radius: 20px; box-shadow: 0px 18px 40px rgba(112, 144, 176, 0.12); border: 2px solid transparent; transition: 0.3s; }
    .alerta-churn { border-color: var(--bad) !important; background: #fffafa; animation: pulseAlert 2s infinite; }
    @keyframes pulseAlert { 0%, 100% { box-shadow: 0px 18px 40px rgba(238, 93, 80, 0.12); } 50% { box-shadow: 0px 18px 40px rgba(238, 93, 80, 0.35); } }

    .card-stat h3 { margin: 0 0 15px 0; font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    .card-stat .value { font-size: 28px; font-weight: 800; margin-bottom: 5px; }
    .compare-label { font-size: 12px; color: var(--muted); margin-bottom: 8px; display: block; font-weight: 600; }
    .variation { font-size: 14px; font-weight: 800; display: flex; align-items: center; gap: 5px; }

    .collapsible-section { background: var(--card); border-radius: 20px; margin-bottom: 20px; box-shadow: 0px 18px 40px rgba(112, 144, 176, 0.08); }
    .collapsible-trigger { padding: 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
    .arrow-icon { transition: 0.3s ease; background: var(--bg); width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 50%; color: var(--primary); }
    .active-section .arrow-icon { transform: rotate(180deg); }
    .collapsible-content { display: none; padding: 0 20px 20px 20px; }
    .active-section .collapsible-content { display: block; }

    table { width: 100%; border-collapse: collapse; }
    th { text-align: center; padding: 15px; color: var(--muted); font-size: 12px; border-bottom: 1px solid var(--border); }
    td { padding: 10px; border-bottom: 1px solid var(--border); text-align: center; font-weight: 600; }
    
    input.valor { width: 130px; padding: 8px; border: 1px solid var(--border); border-radius: 8px; text-align: right; font-weight: 700; background: #fff; }
    input.travado { background: #f4f7fe !important; color: #707eae !important; cursor: not-allowed !important; border: 1px dashed var(--border) !important; }
    
    .positivo { color: var(--good); }
    .negativo { color: var(--bad); }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="header-info">
      <h1>PACS v2.7 <span id="statusBadge">ANALISANDO</span></h1>
      <p>Performance: <span id="labelFoco">MED</span> | <span id="labelMes">...</span></p>
    </div>
    <div class="top-controls">
      <div class="brand-selector">
        <button class="brand-btn active" id="btnMED" onclick="toggleMarca('MED')">MED</button>
        <button class="brand-btn" id="btnECOS" onclick="toggleMarca('ECOS')">ECOS</button>
      </div>
      <select id="mesSelecionado" onchange="atualizarTudo()"></select>
    </div>
  </div>

  <div class="grid-stats">
    <div class="card-stat" id="cardVendas">
      <h3>Vendas Mensais</h3>
      <span class="compare-label">2025: <b id="valVenda25">R$ 0,00</b></span>
      <div class="value" id="valVenda26">R$ 0,00</div>
      <div class="variation" id="varVendaMes">0%</div>
    </div>
    <div class="card-stat" id="cardCancel">
      <h3>Cancelamentos</h3>
      <span class="compare-label">2025: <b id="valCancel25">R$ 0,00</b></span>
      <div class="value" id="valCancel26">R$ 0,00</div>
      <div class="variation" id="varCancelMes">0%</div>
    </div>
    <div class="card-stat">
      <h3>Venda Acumulada</h3>
      <span class="compare-label">2025: <b id="valVendaAcum25">R$ 0,00</b></span>
      <div class="value" id="valVendaAcum26" style="color: var(--primary);">R$ 0,00</div>
    </div>
    <div class="card-stat">
      <h3>Cancel. Acumulado</h3>
      <span class="compare-label">2025: <b id="valCancelAcum25">R$ 0,00</b></span>
      <div class="value" id="valCancelAcum26">R$ 0,00</div>
    </div>
  </div>

  <div id="secaoDados" class="collapsible-section">
    <div class="collapsible-trigger" onclick="toggleCollapsible()">
      <h2>📊 Base de Dados</h2>
      <div class="arrow-icon">▼</div>
    </div>
    <div class="collapsible-content">
      <table>
        <thead><tr><th>Mês</th><th>Vendas 25</th><th>Vendas 26</th><th>Canc. 25</th><th>Canc. 26</th><th>Crescimento</th><th>Churn</th></tr></thead>
        <tbody id="tabelaCorpo"></tbody>
      </table>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
  import { getFirestore, doc, setDoc, getDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: 'AIzaSyCRxs7TRimJWJIQTK2YfyC8vlea8zN7aQ4',
    authDomain: 'indicadores---comercial.firebaseapp.com',
    projectId: 'indicadores---comercial',
    storageBucket: 'indicadores---comercial.firebasestorage.app',
    messagingSenderId: '466070366982',
    appId: '1:466070366982:web:fb544884025f1723fe8c87'
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const mesesFull = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const dados2025 = {
    MED: { v: [7698.73, 7384.1, 7319.21, 6889.7, 6787.88, 6555.33, 6120.57, 7382.24, 7722.42, 9290, 7539.89, 1630], c: [8388.78, 14521.65, 5923.47, 6952.96, 11365.47, 6861.42, 12172.26, 9403.44, 8302.92, 11795.2, 12577.45, 9324.45] },
    ECOS: { v: [10887.5, 430, 7425, 9750, 7285, 2920, 10380, 9300, 7080, 5716.86, 3400, 1500], c: [1800, 4352.68, 4415.34, 2095.42, 3774.83, 4452.77, 8607.01, 8326.79, 6160.05, 4789.13, 10800, 4707.5] }
  };

  let marcaAtiva = 'MED';
  let secaoAberta = false;
  let dadosCache = { MED: {}, ECOS: {} };

  const sel = document.getElementById('mesSelecionado');
  mesesFull.forEach((m, i) => sel.add(new Option(m, i)));
  sel.value = 3; 

  window.toggleCollapsible = () => {
    secaoAberta = !secaoAberta;
    document.getElementById('secaoDados').classList.toggle('active-section', secaoAberta);
    salvarNoFirebase();
  };

  window.toggleMarca = (m) => {
    salvarNaMemoria();
    marcaAtiva = m;
    document.getElementById('btnMED').classList.toggle('active', m === 'MED');
    document.getElementById('btnECOS').classList.toggle('active', m === 'ECOS');
    document.getElementById('labelFoco').textContent = m;
    gerarTabela();
    atualizarTudo();
  };

  function salvarNaMemoria() {
    mesesFull.forEach((_, i) => {
      const v = document.getElementById(`v26_${i}`);
      const c = document.getElementById(`c26_${i}`);
      if(v) dadosCache[marcaAtiva][`v26_${i}`] = v.value;
      if(c) dadosCache[marcaAtiva][`c26_${i}`] = c.value;
    });
  }

  window.maskMoney = (i) => {
    let v = i.value.replace(/\D/g, '');
    v = (v / 100).toFixed(2).replace(".", ",").replace(/(\d)(?=(\d{3})+(?!\d))/g, "$1.");
    i.value = v;
    atualizarTudo();
  };

  function format(n) { return n.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }
  function getVal(id) {
    const el = document.getElementById(id);
    return el ? parseFloat(el.value.replace(/\./g, '').replace(',', '.')) || 0 : 0;
  }

  function gerarTabela() {
    const corpo = document.getElementById('tabelaCorpo');
    corpo.innerHTML = '';
    mesesFull.forEach((m, i) => {
      const v25 = dados2025[marcaAtiva].v[i];
      const c25 = dados2025[marcaAtiva].c[i];
      const v26Val = dadosCache[marcaAtiva][`v26_${i}`] || '';
      const c26Val = dadosCache[marcaAtiva][`c26_${i}`] || '';
      const isBloqueado = i < 3 ? 'readonly class="valor travado"' : 'class="valor"';
      
      corpo.innerHTML += `
        <tr>
          <td><b>${m.substring(0,3)}</b></td>
          <td><input class="valor travado" value="${v25.toLocaleString('pt-BR',{minimumFractionDigits:2})}" readonly></td>
          <td><input ${isBloqueado} id="v26_${i}" oninput="maskMoney(this)" value="${v26Val}"></td>
          <td><input class="valor travado" value="${c25.toLocaleString('pt-BR',{minimumFractionDigits:2})}" readonly></td>
          <td><input ${isBloqueado} id="c26_${i}" oninput="maskMoney(this)" value="${c26Val}"></td>
          <td id="rowVar_${i}">0%</td>
          <td id="rowTaxa_${i}">0%</td>
        </tr>`;
    });
  }

  window.atualizarTudo = () => {
    salvarNaMemoria();
    const mesIdx = parseInt(sel.value);
    document.getElementById('labelMes').textContent = mesesFull[mesIdx];
    let aV26 = 0, aC26 = 0, aV25 = 0, aC25 = 0;

    mesesFull.forEach((_, i) => {
      const v25 = dados2025[marcaAtiva].v[i];
      const c25 = dados2025[marcaAtiva].c[i];
      const v26 = getVal(`v26_${i}`);
      const c26 = getVal(`c26_${i}`);
      
      if(i <= mesIdx) { aV26 += v26; aC26 += c26; aV25 += v25; aC25 += c25; }
      
      const cresc = v25 > 0 ? ((v26 - v25) / v25 * 100).toFixed(1) : 0;
      const elVar = document.getElementById(`rowVar_${i}`);
      elVar.textContent = (cresc > 0 ? '+' : '') + cresc + '%';
      elVar.className = cresc >= 0 ? 'positivo' : 'negativo';
      
      const taxaChurn = (v26 > 0 ? (c26/v26*100).toFixed(1) : 0);
      const elChurn = document.getElementById(`rowTaxa_${i}`);
      elChurn.textContent = taxaChurn + '%';
      elChurn.className = taxaChurn > 15 ? 'negativo' : 'positivo';

      // Atualiza os cards principais se for o mês selecionado
      if (i === mesIdx) {
        const elVarMes = document.getElementById('varVendaMes');
        elVarMes.textContent = (cresc > 0 ? '+' : '') + cresc + '%';
        elVarMes.className = 'variation ' + (cresc >= 0 ? 'positivo' : 'negativo');

        const crescCancel = c25 > 0 ? ((c26 - c25) / c25 * 100).toFixed(1) : 0;
        const elVarCan = document.getElementById('varCancelMes');
        elVarCan.textContent = (crescCancel > 0 ? '+' : '') + crescCancel + '%';
        elVarCan.className = 'variation ' + (crescCancel <= 0 ? 'positivo' : 'negativo');

        // Status de Churn
        const cardCancel = document.getElementById('cardCancel');
        const badge = document.getElementById('statusBadge');
        if (taxaChurn > 15) {
          cardCancel.classList.add('alerta-churn');
          badge.textContent = 'ATENÇÃO CHURN';
          badge.style.background = 'var(--bad)';
        } else {
          cardCancel.classList.remove('alerta-churn');
          badge.textContent = 'SAUDÁVEL';
          badge.style.background = 'var(--good)';
        }
      }
    });

    document.getElementById('valVenda25').textContent = format(dados2025[marcaAtiva].v[mesIdx]);
    document.getElementById('valVenda26').textContent = format(getVal(`v26_${mesIdx}`));
    document.getElementById('valCancel25').textContent = format(dados2025[marcaAtiva].c[mesIdx]);
    document.getElementById('valCancel26').textContent = format(getVal(`c26_${mesIdx}`));
    document.getElementById('valVendaAcum25').textContent = format(aV25);
    document.getElementById('valVendaAcum26').textContent = format(aV26);
    document.getElementById('valCancelAcum25').textContent = format(aC25);
    document.getElementById('valCancelAcum26').textContent = format(aC26);

    agendarSalvamento();
  };

  let timer;
  function agendarSalvamento() { clearTimeout(timer); timer = setTimeout(salvarNoFirebase, 1500); }

  async function salvarNoFirebase() {
    const payload = { ...dadosCache, config: { marcaAtiva, secaoAberta, mes: sel.value } };
    await setDoc(doc(db, 'dashboard', 'pacs_v2'), payload);
  }

  async function carregar() {
    const snap = await getDoc(doc(db, 'dashboard', 'pacs_v2'));
    if(snap.exists()) {
      const d = snap.data();
      dadosCache.MED = d.MED || {};
      dadosCache.ECOS = d.ECOS || {};
      if(d.config) {
        marcaAtiva = d.config.marcaAtiva || 'MED';
        secaoAberta = d.config.secaoAberta || false;
        sel.value = d.config.mes || sel.value;
      }
    }
    toggleMarca(marcaAtiva);
    document.getElementById('secaoDados').classList.toggle('active-section', secaoAberta);
  }

  carregar();
</script>
</body>
</html>
